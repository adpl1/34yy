<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - متجر مسلم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-right"></i>
        </div>
        <h3>سلة التسوق</h3>
        <div></div>
    </header>

    <main class="m-10">
        <div id="cart-items-container">
            <!-- Cart items will be loaded here -->
        </div>

        <div id="cart-summary" class="admin-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>المجموع الفرعي:</span>
                <span id="subtotal">0 ر.س</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>التوصيل:</span>
                <span>مجاني</span>
            </div>
            <hr>
            <div style="display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; font-size: 18px;">
                <span>الإجمالي:</span>
                <span id="total-price">0 ر.س</span>
            </div>
            <button class="btn btn-primary" onclick="location.href='checkout.html'">إتمام الطلب</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="products.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>الأقسام</span>
        </a>
        <a href="cart.html" class="nav-item active">
            <i class="fas fa-shopping-cart"></i>
            <span>السلة</span>
        </a>
        <a href="track.html" class="nav-item">
            <i class="fas fa-truck"></i>
            <span>تتبع الطلب</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
