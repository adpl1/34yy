<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الطلب - متجر مسلم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-right"></i>
        </div>
        <h3>تتبع الطلب</h3>
        <div></div>
    </header>

    <main class="m-10">
        <div class="admin-card">
            <h4>أدخل رقم الطلب</h4>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="track-order-id" placeholder="رقم الطلب (مثال: ORD-12345)" style="margin: 0;">
                <button class="btn btn-primary" id="track-btn" style="width: auto; padding: 10px 20px;">تتبع</button>
            </div>
        </div>

        <div id="track-result" class="admin-card hidden">
            <div style="text-align: center; margin-bottom: 20px;">
                <h4 id="track-status" style="color: var(--primary-color); font-size: 20px;">جاري التجهيز</h4>
                <p id="track-date" style="color: var(--gray); font-size: 14px;"></p>
            </div>
            
            <div class="tracking-steps" style="position: relative; padding-right: 30px;">
                <div style="border-right: 2px solid #eee; position: absolute; top: 0; bottom: 0; right: 10px;"></div>
                <div class="step" id="step-pending" style="margin-bottom: 20px; position: relative;">
                    <div style="width: 20px; height: 20px; background: #eee; border-radius: 50%; position: absolute; right: -29px; top: 0;"></div>
                    <strong>تم استلام الطلب</strong>
                </div>
                <div class="step" id="step-processing" style="margin-bottom: 20px; position: relative;">
                    <div style="width: 20px; height: 20px; background: #eee; border-radius: 50%; position: absolute; right: -29px; top: 0;"></div>
                    <strong>جاري التجهيز</strong>
                </div>
                <div class="step" id="step-shipped" style="margin-bottom: 20px; position: relative;">
                    <div style="width: 20px; height: 20px; background: #eee; border-radius: 50%; position: absolute; right: -29px; top: 0;"></div>
                    <strong>تم الشحن</strong>
                </div>
                <div class="step" id="step-delivered" style="position: relative;">
                    <div style="width: 20px; height: 20px; background: #eee; border-radius: 50%; position: absolute; right: -29px; top: 0;"></div>
                    <strong>تم التوصيل</strong>
                </div>
            </div>

            <div id="track-order-details" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="products.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>الأقسام</span>
        </a>
        <a href="cart.html" class="nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>السلة</span>
        </a>
        <a href="track.html" class="nav-item active">
            <i class="fas fa-truck"></i>
            <span>تتبع الطلب</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
