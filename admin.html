<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجر مسلم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-tabs {
            display: flex;
            overflow-x: auto;
            background: white;
            padding: 10px;
            gap: 10px;
            position: sticky;
            top: 60px;
            z-index: 900;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tab-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #eee;
            background: #f9f9f9;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .order-card {
            border-right: 5px solid var(--primary-color);
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: #ffeeba; color: #856404; }
        .status-processing { background: #b8daff; color: #004085; }
        .status-shipped { background: #c3e6cb; color: #155724; }
        .status-delivered { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img id="admin-logo" src="https://via.placeholder.com/150x50?text=Logo" alt="Logo">
        </div>
        <h3>لوحة التحكم</h3>
        <div onclick="location.href='index.html'"><i class="fas fa-external-link-alt"></i></div>
    </header>

    <div class="admin-tabs">
        <div class="tab-btn active" onclick="showTab('orders')">الطلبات</div>
        <div class="tab-btn" onclick="showTab('products')">المنتجات</div>
        <div class="tab-btn" onclick="showTab('banners')">الإعلانات</div>
        <div class="tab-btn" onclick="showTab('settings')">الإعدادات</div>
    </div>

    <main class="admin-container">
        <!-- Orders Tab -->
        <div id="tab-orders" class="tab-content">
            <h4>الطلبات الواردة</h4>
            <div id="admin-orders-list">
                <!-- Orders will be loaded here -->
            </div>
        </div>

        <!-- Products Tab -->
        <div id="tab-products" class="tab-content hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h4>إدارة المنتجات</h4>
                <button class="btn btn-primary" style="width: auto;" onclick="openProductModal()">إضافة منتج</button>
            </div>
            <div id="admin-products-list">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <!-- Banners Tab -->
        <div id="tab-banners" class="tab-content hidden">
            <h4>إدارة الإعلانات (Banners)</h4>
            <div class="admin-card">
                <input type="text" id="banner-url" placeholder="رابط صورة الإعلان">
                <button class="btn btn-primary" onclick="addBanner()">إضافة إعلان</button>
            </div>
            <div id="admin-banners-list" style="margin-top: 15px;">
                <!-- Banners will be loaded here -->
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="tab-content hidden">
            <h4>إعدادات المتجر</h4>
            <div class="admin-card">
                <label>شعار المتجر (رابط الصورة)</label>
                <input type="text" id="settings-logo-url" placeholder="https://example.com/logo.png">
                <button class="btn btn-primary" onclick="updateStoreSettings()">حفظ الإعدادات</button>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="admin-card" style="width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
            <h4 id="modal-title">إضافة منتج جديد</h4>
            <input type="hidden" id="edit-product-id">
            <input type="text" id="p-name" placeholder="اسم المنتج" required>
            <input type="number" id="p-price" placeholder="السعر (ر.س)" required>
            <input type="text" id="p-image" placeholder="رابط الصورة" required>
            <textarea id="p-desc" placeholder="وصف المنتج" rows="3"></textarea>
            <input type="text" id="p-category" placeholder="القسم">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-primary" onclick="saveProduct()">حفظ</button>
                <button class="btn" style="background: #eee;" onclick="closeProductModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            
            if(tabName === 'orders') loadAdminOrders();
            if(tabName === 'products') loadAdminProducts();
            if(tabName === 'banners') loadAdminBanners();
            if(tabName === 'settings') loadAdminSettings();
        }

        function openProductModal(id = null) {
            document.getElementById('product-modal').classList.remove('hidden');
            if(id) {
                document.getElementById('modal-title').innerText = 'تعديل المنتج';
                // Load product data into fields (handled in app.js)
            } else {
                document.getElementById('modal-title').innerText = 'إضافة منتج جديد';
                document.getElementById('edit-product-id').value = '';
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-image').value = '';
                document.getElementById('p-desc').value = '';
                document.getElementById('p-category').value = '';
            }
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
