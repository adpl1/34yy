<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر مسلم - تطبيق التسوق</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css" />
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img id="store-logo" src="https://via.placeholder.com/150x50?text=Logo" alt="Logo">
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
        </div>
        <div class="cart-icon" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Banner Slider -->
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="banner-container">
                <!-- Banners will be loaded here -->
                <div class="swiper-slide"><img src="https://via.placeholder.com/500x200?text=Banner+1" style="width:100%"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <!-- Categories -->
        <div class="categories-section m-10">
            <h3>الأقسام</h3>
            <div class="categories-grid" id="categories-container" style="display: flex; overflow-x: auto; gap: 10px; padding: 10px 0;">
                <!-- Categories will be loaded here -->
            </div>
        </div>

        <!-- Featured Products -->
        <div class="products-section m-10">
            <h3>المنتجات المميزة</h3>
            <div id="products-container" class="products-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="products.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>الأقسام</span>
        </a>
        <a href="cart.html" class="nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>السلة</span>
        </a>
        <a href="track.html" class="nav-item">
            <i class="fas fa-truck"></i>
            <span>تتبع الطلب</span>
        </a>
        <a href="admin.html" class="nav-item">
            <i class="fas fa-user-shield"></i>
            <span>المدير</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        const swiper = new Swiper(".mySwiper", {
            pagination: {
                el: ".swiper-pagination",
            },
            autoplay: {
                delay: 3000,
            },
        });
    </script>
</body>
</html>
